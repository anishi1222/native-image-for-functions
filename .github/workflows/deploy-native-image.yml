# This is a basic workflow that is manually triggered

name: Build Native Image and deploy it to Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
      id-token: write
      contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Setup GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '21'
        distribution: 'graalvm'
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build
      run: |
        mvn package -Pnative
        ls -lR
        cd ./target/${{ secrets.AZURE_FUNCTIONS_APP_NAME }}
        zip -r -0 ../${{ secrets.AZURE_FUNCTIONS_APP_NAME }}.zip .

    - name: push artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-artifact
        path: ./target/${{ secrets.AZURE_FUNCTIONS_APP_NAME }}.zip
      
  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: login Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        auth-type: IDENTITY

    - name: pop artifact
      uses: actions/download-artifact@v4
      with:
        name: my-artifact
        path: ./

    - name: Display structure of downloaded files
      run: |
        ls -R ./
        unzip -t ${{ secrets.AZURE_FUNCTIONS_APP_NAME }}.zip
        
