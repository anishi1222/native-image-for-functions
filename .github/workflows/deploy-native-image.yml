# This is a basic workflow that is manually triggered

name: Build Native Image and deploy it to Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
      id-token: write
      contents: read

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout codes and setup GraalVM
    - uses: actions/checkout@v4
    - uses: graalvm/setup-graalvm@v1
      with:
        java-version: '21'
        distribution: 'graalvm'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        native-image-job-reports: 'true'
        
    - name: Build
      run: |
        mvn clean package -Pnative

    - name: packaging
      run: |
        mkdir packing && cd packing
        cp -R ./src/main/function/. .
        cp ./target/demofunc .
        zip -r -0 ../${{ secrets.AZURE_FUNCTIONS_APP_NAME }}.zip .

    - name: push artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-artifact
        path: ./${{ secrets.AZURE_FUNCTIONS_APP_NAME }}.zip
      
  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: login Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        auth-type: IDENTITY

    - name: pop artifact
      uses: actions/download-artifact@v4
      with:
        name: my-artifact
        path: ./

    - name: Display structure of downloaded files
      run: |
        ls -R ./
        unzip -t ${{ secrets.AZURE_FUNCTIONS_APP_NAME }}.zip
        
