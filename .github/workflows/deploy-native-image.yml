# This is a basic workflow that is manually triggered

name: Build Native Image and deploy it to Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: checkout codes
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: checkout codes and setup GraalVM
      uses: graalvm/setup-graalvm@329c42c5f4c343bceb505f0b28cc8499bc2bf174 # v1.5.4
      with:
        java-version: '25'
        distribution: 'graalvm'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Run JVM tests
      run: mvn -B -Dpackaging=jar test

    - name: Build linux/amd64 native package
      run: |
        docker build --platform linux/amd64 --target artifact --output type=local,dest=./target .
        ls -la ./target/
        unzip -t ./target/app.zip

    - name: push artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: my-artifact
        path: ./target/app.zip
      
