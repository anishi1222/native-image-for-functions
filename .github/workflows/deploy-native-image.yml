# This is a basic workflow that is manually triggered

name: Build Native Image and deploy it to Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: checkout codes
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: checkout codes and setup GraalVM
      uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38 # v1.5.6
      with:
        java-version: '25'
        distribution: 'graalvm'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Run JVM tests
      run: mvn -B -Dpackaging=jar test

    - name: Build linux/amd64 native package
      run: |
        docker build --platform linux/amd64 --target artifact --output type=local,dest=./target .
        ls -la ./target/
        unzip -t ./target/app.zip

    - name: push artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: my-artifact
        path: ./target/app.zip
      
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: login Azure
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Validate Function App exists
      shell: bash
      run: |
        set -euo pipefail
        az account show --query "{subscription:id, tenantId:tenantId}" -o table
        az functionapp show \
          --name "${{ secrets.AZURE_FUNCTIONS_APP_NAME }}" \
          --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
          --query "{name:name, state:state, defaultHostName:defaultHostName}" \
          -o table

    - name: pop artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: my-artifact
        path: ./

    - name: Deploy to Azure Functions
      uses: azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1
      with:
        app-name: ${{ secrets.AZURE_FUNCTIONS_APP_NAME }}
        package: ./app.zip
