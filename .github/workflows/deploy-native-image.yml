# This is a basic workflow that is manually triggered

name: Build Native Image and deploy it to Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
      id-token: write
      contents: read

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: checkout codes
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: checkout codes and setup GraalVM
      uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1
      with:
        java-version: '25'
        distribution: 'graalvm'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and packaging
      run: |
        mvn -B install
        ls -la ./target/
        ./compress.sh

    - name: push artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: my-artifact
        path: ./target/app.zip
      
  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: login Azure
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: pop artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: my-artifact
        path: ./

    - name: Display structure of downloaded files

      run: |
        ls -R ./
        unzip -t app.zip

    - name: Deploy to Azure Functions
      uses: azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1
      with:
        app-name: ${{ secrets.AZURE_FUNCTIONS_APP_NAME }}
        package: './app.zip'

